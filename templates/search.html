<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <title>

        Search Event

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- عنوان -->
    <h1>

        Search Event

    </h1>

    <hr>

    <!-- فرم جستجو -->
    <form>

        <div class="mb-3">

            <label class="form-label">

                Event ID

            </label>

            <input

                type="number"

                name="event_id"

                class="form-control"

            >

        </div>

        <button

            type="submit"

            class="btn btn-primary"

        >

            Search

        </button>

    </form>

    <hr>

    <!-- نتیجه جستجو -->
    {% if event %}

        <div class="card">

            <div class="card-body">

                <h5>

                    Event Found

                </h5>

                <p>

                    {{ event }}

                </p>

            </div>

        </div>

    {% endif %}

</div>

</body>

</html>
